<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Window Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #09090b;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fafafa;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(39, 39, 42, 1);
            border-radius: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
        }

        .btn-secondary {
            background: rgba(39, 39, 42, 1);
            border: 1px solid rgba(63, 63, 70, 1);
            transition: all 0.2s;
        }

        .btn-secondary:active {
            background: rgba(63, 63, 70, 1);
            transform: scale(0.96);
        }

        .btn-danger {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            color: #ef4444;
            transition: all 0.2s;
        }

        .btn-danger:active {
            background: rgba(220, 38, 38, 0.2);
            transform: scale(0.96);
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            background: #27272a;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fafafa;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .input-dark {
            background: #18181b;
            border: 1px solid #27272a;
            color: #fafafa;
            border-radius: 10px;
        }

        .input-dark:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">
    <div class="w-full max-w-5xl">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="p-3 glass-card bg-indigo-500/10 border-indigo-500/20">
                    <i data-lucide="layout-dashboard" class="text-indigo-400 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">Atlas Controller</h1>
                    <div class="flex flex-wrap gap-2 mt-2">
                        {{range .IPs}}
                        <div class="flex items-center gap-2 px-2 py-1 rounded-full bg-zinc-900 border border-zinc-800">
                            <div class="status-pulse"></div>
                            <span class="text-[10px] font-mono text-zinc-400">{{.}}:5000</span>
                        </div>
                        {{end}}
                    </div>
                </div>
            </div>
            <button onclick="shutdownPC()" class="btn-danger flex items-center gap-2 px-6 py-3 font-bold text-sm rounded-xl">
                <i data-lucide="power" class="w-4 h-4"></i>
                Shutdown
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Controls Column -->
            <div class="lg:col-span-5 space-y-8">
                <section class="glass-card p-6 border-zinc-800/50">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="sliders" class="w-4 h-4 text-zinc-400"></i>
                        <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-widest">System Control</h2>
                    </div>
                    <div class="space-y-8">
                        <div>
                            <div class="flex justify-between mb-4">
                                <span class="text-xs font-semibold text-zinc-500">SYSTEM VOLUME</span>
                                <span id="volumeVal" class="text-xs font-bold text-indigo-400">50%</span>
                            </div>
                            <input type="range" min="0" max="100" value="50" oninput="document.getElementById('volumeVal').innerText = this.value + '%'" onchange="setVolume(this.value)" class="w-full">
                        </div>
                        
                        <div>
                            <span class="text-xs font-semibold text-zinc-500 block mb-4 uppercase">Launch Application</span>
                            <div class="flex gap-3">
                                <input type="text" id="openCommand" placeholder="Command (e.g. chrome)" class="input-dark flex-grow px-4 py-3 text-sm">
                                <button onclick="openApp()" class="btn-primary p-3 rounded-xl">
                                    <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="glass-card p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="clipboard" class="w-4 h-4 text-zinc-400"></i>
                        <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Clipboard</h2>
                    </div>
                    <div class="space-y-4">
                        <textarea id="clipboardArea" rows="4" class="input-dark w-full p-4 text-sm focus:outline-none resize-none custom-scroll" placeholder="Text to sync..."></textarea>
                        <div class="flex gap-3">
                            <button onclick="getClipboard()" class="btn-secondary flex-grow py-3 text-xs font-bold rounded-xl flex items-center justify-center gap-2">
                                <i data-lucide="download" class="w-3 h-3"></i> PULL
                            </button>
                            <button onclick="setClipboard()" class="btn-primary flex-grow py-3 text-xs font-bold rounded-xl flex items-center justify-center gap-2">
                                <i data-lucide="upload" class="w-3 h-3"></i> PUSH
                            </button>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Windows Column -->
            <section class="lg:col-span-7 glass-card p-6 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-2">
                        <i data-lucide="monitor" class="w-4 h-4 text-zinc-400"></i>
                        <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Active Windows</h2>
                    </div>
                    <button onclick="refreshWindows()" class="btn-secondary p-2 rounded-lg">
                        <i data-lucide="refresh-cw" class="w-4 h-4 text-zinc-400"></i>
                    </button>
                </div>
                <div id="windowList" class="space-y-4 overflow-y-auto max-h-[600px] pr-2 custom-scroll">
                    <p class="text-center py-20 text-zinc-600 italic">Loading active windows...</p>
                </div>
            </section>
        </div>
    </div>

    <!-- Screenshot Modal -->
    <div id="screenshotModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
        <div class="glass-card w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <h3 id="modalTitle" class="font-bold text-zinc-200 truncate">Screenshot</h3>
                <button onclick="closeScreenshotModal()" class="btn-secondary p-2 rounded-lg hover:text-red-500">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="overflow-auto p-4 bg-black/40">
                <img id="screenshotImg" src="" alt="Screenshot" class="max-w-full h-auto mx-auto rounded-lg shadow-2xl border border-zinc-800">
            </div>
        </div>
    </div>

    <!-- Keyboard Modal -->
    <div id="keyboardModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
        <div class="glass-card w-full max-w-md p-6 space-y-6 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 id="keyboardModalTitle" class="font-bold text-zinc-200 truncate uppercase tracking-wider text-sm">Keyboard Input</h3>
                <button onclick="closeKeyboardModal()" class="btn-secondary p-2 rounded-lg hover:text-red-500">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="flex gap-2">
                    <input type="text" id="keyboardInput" class="input-dark flex-grow px-4 py-3 text-sm" placeholder="Message...">
                    <button onclick="submitKeyboardText()" class="btn-primary px-6 rounded-xl">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="sendKey('enter')" class="btn-secondary py-3 text-[10px] font-bold text-indigo-400">ENTER</button>
                    <button onclick="sendKey('backspace')" class="btn-secondary py-3 text-[10px] font-bold">BS</button>
                    <button onclick="sendKey('tab')" class="btn-secondary py-3 text-[10px] font-bold">TAB</button>
                    <button onclick="sendKey('escape')" class="btn-secondary py-3 text-[10px] font-bold">ESC</button>
                    <button onclick="sendKey('up')" class="btn-secondary py-3"><i data-lucide="chevron-up" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="sendKey('down')" class="btn-secondary py-3"><i data-lucide="chevron-down" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="sendKey('left')" class="btn-secondary py-3"><i data-lucide="chevron-left" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="sendKey('right')" class="btn-secondary py-3"><i data-lucide="chevron-right" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="sendKey('space')" class="btn-secondary py-3 text-[10px] font-bold col-span-2">SPACE</button>
                    <button onclick="sendKey('f5')" class="btn-secondary py-3 text-[10px] font-bold">F5</button>
                    <button onclick="sendKey('win')" class="btn-secondary py-3 text-[10px] font-bold"><i data-lucide="clover" class="w-4 h-4 mx-auto"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentHandle = null;

        async function refreshWindows() {
            const list = document.getElementById('windowList');
            try {
                const response = await fetch('/api/windows');
                const windows = await response.json();
                
                if (windows.length === 0) {
                    list.innerHTML = '<div class="text-center py-20 text-zinc-600"><i data-lucide="monitor-off" class="w-12 h-12 mx-auto mb-4 opacity-20"></i><p class="text-sm">No active windows found</p></div>';
                    lucide.createIcons();
                    return;
                }

                windows.sort((a, b) => {
                    if (a.controllable && !b.controllable) return -1;
                    if (!a.controllable && b.controllable) return 1;
                    return a.title.localeCompare(b.title);
                });

                list.innerHTML = windows.map(win => `
                    <div class="glass-card p-5 group hover:border-zinc-700 transition-all duration-300">
                        <div class="flex flex-col gap-5">
                            <div class="flex items-center justify-between gap-4">
                                <div class="flex items-center min-w-0 flex-grow">
                                    <div class="w-2 h-2 rounded-full mr-3 shrink-0 ${win.controllable ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'bg-zinc-700'}"></div>
                                    <span class="font-bold text-zinc-100 truncate text-xs uppercase tracking-wide" title="${win.title}">${win.title}</span>
                                </div>
                                <button onclick="closeWindow('${win.handle}')" class="text-zinc-600 hover:text-red-500 transition-colors">
                                    <i data-lucide="x-circle" class="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            ${win.controllable ? `
                            <div class="flex flex-col gap-4">
                                <div class="flex flex-wrap gap-2">
                                    <button onclick="focusWindow('${win.handle}')" class="btn-secondary px-4 py-2 text-[9px] font-black uppercase tracking-widest text-indigo-400">Focus</button>
                                    <button onclick="openKeyboardModal('${win.handle}', '${win.title.replace(/'/g, "\\'")}')" class="btn-secondary px-4 py-2 text-[9px] font-black uppercase tracking-widest flex items-center gap-2">
                                        <i data-lucide="keyboard" class="w-3 h-3"></i> Type
                                    </button>
                                    <button onclick="takeScreenshot('${win.handle}', '${win.title.replace(/'/g, "\\'")}')" class="btn-secondary px-4 py-2 text-[9px] font-black uppercase tracking-widest text-emerald-400">Snap</button>
                                    <button onclick="snapWindow('${win.handle}', 'next-monitor')" class="btn-secondary px-4 py-2 text-[9px] font-black uppercase tracking-widest text-orange-400">Move</button>
                                </div>
                                <div class="flex gap-2 p-1 bg-black/20 rounded-xl justify-center">
                                    <button onclick="snapWindow('${win.handle}', 'top-left')" class="p-2 hover:text-white text-zinc-500" title="Top Left"><i data-lucide="arrow-up-left" class="w-4 h-4"></i></button>
                                    <button onclick="snapWindow('${win.handle}', 'top-right')" class="p-2 hover:text-white text-zinc-500" title="Top Right"><i data-lucide="arrow-up-right" class="w-4 h-4"></i></button>
                                    <button onclick="snapWindow('${win.handle}', 'bottom-left')" class="p-2 hover:text-white text-zinc-500" title="Bottom Left"><i data-lucide="arrow-down-left" class="w-4 h-4"></i></button>
                                    <button onclick="snapWindow('${win.handle}', 'bottom-right')" class="p-2 hover:text-white text-zinc-500" title="Bottom Right"><i data-lucide="arrow-down-right" class="w-4 h-4"></i></button>
                                    <button onclick="snapWindow('${win.handle}', 'full')" class="p-2 hover:text-white text-zinc-500" title="Fullscreen"><i data-lucide="maximize" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (error) {
                list.innerHTML = '<div class="text-red-500/50 text-center py-10 text-xs font-bold uppercase tracking-widest">Connection Lost</div>';
            }
        }

        function openKeyboardModal(handle, title) {
            currentHandle = handle;
            document.getElementById('keyboardModalTitle').innerText = title;
            document.getElementById('keyboardModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeKeyboardModal() {
            document.getElementById('keyboardModal').classList.add('hidden');
            currentHandle = null;
        }

        async function submitKeyboardText() {
            const input = document.getElementById('keyboardInput');
            if (!input.value || !currentHandle) return;
            await fetch('/api/type', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle: currentHandle, text: input.value })
            });
            input.value = '';
        }

        async function sendKey(key) {
            if (!currentHandle) return;
            await fetch('/api/key', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle: currentHandle, key })
            });
        }

        async function takeScreenshot(handle, title) {
            const img = document.getElementById('screenshotImg');
            const modal = document.getElementById('screenshotModal');
            document.getElementById('modalTitle').innerText = title;
            img.src = `/api/screenshot?handle=${handle}&t=${Date.now()}`;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeScreenshotModal() {
            document.getElementById('screenshotModal').classList.add('hidden');
        }

        async function focusWindow(handle) {
            await fetch('/api/focus', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle })
            });
        }

        async function snapWindow(handle, position) {
            await fetch('/api/snap', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle, position })
            });
            if (position === 'next-monitor') setTimeout(refreshWindows, 500);
        }

        async function closeWindow(handle) {
            if (confirm('Terminate window?')) {
                await fetch('/api/close', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ handle })
                });
                setTimeout(refreshWindows, 500);
            }
        }

        async function getClipboard() {
            try {
                const res = await fetch('/api/clipboard/get');
                const data = await res.json();
                document.getElementById('clipboardArea').value = data.text;
            } catch (e) { console.error(e); }
        }

        async function setClipboard() {
            await fetch('/api/clipboard/set', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: document.getElementById('clipboardArea').value })
            });
        }

        async function openApp() {
            const cmd = document.getElementById('openCommand').value;
            if (!cmd) return;
            await fetch('/api/open', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ command: cmd })
            });
            document.getElementById('openCommand').value = '';
            setTimeout(refreshWindows, 1000);
        }

        async function setVolume(level) {
            await fetch('/api/volume', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ level: parseInt(level) })
            });
        }

        async function shutdownPC() {
            if (confirm('Initiate system shutdown?')) {
                await fetch('/api/shutdown', { method: 'POST' });
            }
        }

        refreshWindows();
        lucide.createIcons();
        setInterval(refreshWindows, 15000);
    </script>
</body>
</html>
