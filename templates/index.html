<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Window Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: rgba(255, 255, 255, 0.8);
            --shadow-dark: rgba(163, 177, 198, 0.6);
            --accent-blue: #4f46e5;
            --accent-red: #ef4444;
            --accent-emerald: #10b981;
            --accent-orange: #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: #4a5568;
            -webkit-tap-highlight-color: transparent;
        }

        .nm-flat {
            background: var(--bg-color);
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            border-radius: 20px;
        }

        .nm-inset {
            background: var(--bg-color);
            box-shadow: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            border-radius: 20px;
        }

        .nm-btn {
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            border-radius: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nm-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .nm-btn-danger { color: var(--accent-red); }
        .nm-btn-primary { color: var(--accent-blue); }
        .nm-btn-success { color: var(--accent-emerald); }
        .nm-btn-warning { color: var(--accent-orange); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: var(--bg-color);
            border-radius: 5px;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            cursor: pointer;
            border: 2px solid #fff;
        }

        .modal-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(224, 229, 236, 0.7);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--shadow-dark); border-radius: 10px; }

        .pulse {
            width: 10px; height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">
    <div class="w-full max-w-4xl">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="pulse"></div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-700 tracking-tight">Atlas Controller</h1>
                    <div class="flex flex-wrap gap-2 mt-1">
                        {{range .IPs}}
                        <span class="text-[10px] font-mono nm-inset px-2 py-0.5 text-gray-500">{{.}}:5000</span>
                        {{end}}
                    </div>
                </div>
            </div>
            <button onclick="shutdownPC()" class="nm-btn nm-btn-danger px-6 py-2 font-bold text-sm">
                Shutdown System
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-8">
                <section class="nm-flat p-6">
                    <h2 class="text-lg font-bold text-gray-600 mb-6 uppercase tracking-wider text-sm">System Tuning</h2>
                    <div class="space-y-8">
                        <div>
                            <div class="flex justify-between mb-2 px-1">
                                <span class="text-xs font-bold text-gray-500 uppercase">Volume</span>
                                <span id="volumeVal" class="text-xs font-mono text-indigo-600 font-bold">50%</span>
                            </div>
                            <input type="range" min="0" max="100" value="50" oninput="document.getElementById('volumeVal').innerText = this.value + '%'" onchange="setVolume(this.value)">
                        </div>
                        
                        <div>
                            <span class="text-xs font-bold text-gray-500 uppercase block mb-3 px-1">Quick Launch</span>
                            <div class="flex gap-3">
                                <input type="text" id="openCommand" placeholder="notepad, chrome..." class="nm-inset flex-grow bg-transparent px-4 py-2 text-sm focus:outline-none">
                                <button onclick="openApp()" class="nm-btn nm-btn-primary w-12 h-10">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="nm-flat p-6">
                    <h2 class="text-lg font-bold text-gray-600 mb-6 uppercase tracking-wider text-sm">Universal Clipboard</h2>
                    <div class="space-y-4">
                        <textarea id="clipboardArea" rows="4" class="nm-inset w-full bg-transparent p-4 text-sm focus:outline-none resize-none custom-scroll" placeholder="Sync text with PC..."></textarea>
                        <div class="flex gap-4">
                            <button onclick="getClipboard()" class="nm-btn flex-grow py-3 text-xs font-bold text-indigo-600 uppercase tracking-widest">Pull From PC</button>
                            <button onclick="setClipboard()" class="nm-btn flex-grow py-3 text-xs font-bold text-emerald-600 uppercase tracking-widest">Push To PC</button>
                        </div>
                    </div>
                </section>
            </div>

            <section class="nm-flat p-6 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-gray-600 uppercase tracking-wider text-sm">Active Windows</h2>
                    <button onclick="refreshWindows()" class="nm-btn p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                <div id="windowList" class="space-y-4 overflow-y-auto max-h-[600px] pr-2 custom-scroll pb-4">
                    <p class="text-center py-8 text-gray-400 italic text-sm">Loading windows...</p>
                </div>
            </section>
        </div>
    </div>

    <!-- Modals -->
    <div id="screenshotModal" class="hidden fixed inset-0 modal-blur flex items-center justify-center p-4 z-50">
        <div class="nm-flat w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-4 border-b border-gray-300 flex justify-between items-center">
                <span id="modalTitle" class="font-bold text-gray-600 truncate mr-4">Preview</span>
                <button onclick="closeScreenshotModal()" class="nm-btn nm-btn-danger w-8 h-8 font-bold">✕</button>
            </div>
            <div class="overflow-auto p-4 bg-gray-100 flex-grow">
                <img id="screenshotImg" src="" alt="Screenshot" class="max-w-full h-auto mx-auto rounded-lg shadow-lg">
            </div>
        </div>
    </div>

    <div id="keyboardModal" class="hidden fixed inset-0 modal-blur flex items-center justify-center p-4 z-50">
        <div class="nm-flat w-full max-w-md p-6 space-y-6">
            <div class="flex justify-between items-center">
                <span id="keyboardModalTitle" class="font-bold text-gray-600 truncate">Keyboard Input</span>
                <button onclick="closeKeyboardModal()" class="nm-btn nm-btn-danger w-8 h-8 font-bold">✕</button>
            </div>
            
            <div class="space-y-6">
                <div class="flex gap-3">
                    <input type="text" id="keyboardInput" class="nm-inset flex-grow bg-transparent px-4 py-3 text-sm focus:outline-none" placeholder="Enter text...">
                    <button onclick="submitKeyboardText()" class="nm-btn nm-btn-primary px-4 font-bold text-sm">Send</button>
                </div>
                
                <div class="grid grid-cols-4 gap-4">
                    <button onclick="sendKey('enter')" class="nm-btn py-3 text-xs font-bold text-emerald-600">ENTER</button>
                    <button onclick="sendKey('backspace')" class="nm-btn py-3 text-xs font-bold text-rose-500">BACK</button>
                    <button onclick="sendKey('tab')" class="nm-btn py-3 text-xs font-bold text-gray-500">TAB</button>
                    <button onclick="sendKey('escape')" class="nm-btn py-3 text-xs font-bold text-gray-500">ESC</button>
                    <button onclick="sendKey('up')" class="nm-btn py-3 font-bold text-gray-500">▲</button>
                    <button onclick="sendKey('down')" class="nm-btn py-3 font-bold text-gray-500">▼</button>
                    <button onclick="sendKey('left')" class="nm-btn py-3 font-bold text-gray-500">◀</button>
                    <button onclick="sendKey('right')" class="nm-btn py-3 font-bold text-gray-500">▶</button>
                    <button onclick="sendKey('space')" class="nm-btn py-3 text-xs font-bold text-gray-500 col-span-2">SPACE</button>
                    <button onclick="sendKey('f5')" class="nm-btn py-3 text-xs font-bold text-indigo-500">F5</button>
                    <button onclick="sendKey('win')" class="nm-btn py-3 text-xs font-bold text-indigo-500">WIN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentHandle = null;

        async function refreshWindows() {
            const list = document.getElementById('windowList');
            try {
                const response = await fetch('/api/windows');
                const windows = await response.json();
                
                if (windows.length === 0) {
                    list.innerHTML = '<p class="text-center py-8 text-gray-400 italic text-sm">No active windows found.</p>';
                    return;
                }

                windows.sort((a, b) => {
                    if (a.controllable && !b.controllable) return -1;
                    if (!a.controllable && b.controllable) return 1;
                    return a.title.localeCompare(b.title);
                });

                list.innerHTML = windows.map(win => `
                    <div class="nm-flat p-4 group transition-all duration-300">
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center justify-between gap-3">
                                <div class="flex items-center min-w-0 flex-grow">
                                    <div class="w-2 h-2 rounded-full mr-2 shrink-0 ${win.controllable ? 'bg-emerald-500' : 'bg-gray-300'}"></div>
                                    <span class="font-bold text-gray-600 truncate text-xs uppercase tracking-tight" title="${win.title}">${win.title}</span>
                                </div>
                                <button onclick="closeWindow('${win.handle}')" class="nm-btn w-8 h-8">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            
                            ${win.controllable ? `
                            <div class="flex flex-col gap-3">
                                <div class="flex flex-wrap gap-2">
                                    <button onclick="focusWindow('${win.handle}')" class="nm-btn px-4 py-2 text-[10px] font-extrabold text-indigo-500 uppercase tracking-widest">Focus</button>
                                    <button onclick="openKeyboardModal('${win.handle}', '${win.title.replace(/'/g, "\\'")}')" class="nm-btn px-4 py-2 text-[10px] font-extrabold text-indigo-500 uppercase tracking-widest">Input</button>
                                    <button onclick="takeScreenshot('${win.handle}', '${win.title.replace(/'/g, "\\'")}')" class="nm-btn px-4 py-2 text-[10px] font-extrabold text-emerald-600 uppercase tracking-widest">Snap</button>
                                    <button onclick="snapWindow('${win.handle}', 'next-monitor')" class="nm-btn px-4 py-2 text-[10px] font-extrabold text-orange-500 uppercase tracking-widest">Move</button>
                                </div>
                                <div class="nm-inset p-2 flex justify-between">
                                    <button onclick="snapWindow('${win.handle}', 'top-left')" class="p-2 nm-btn w-9 h-9" title="Top Left">↖️</button>
                                    <button onclick="snapWindow('${win.handle}', 'top-right')" class="p-2 nm-btn w-9 h-9" title="Top Right">↗️</button>
                                    <button onclick="snapWindow('${win.handle}', 'bottom-left')" class="p-2 nm-btn w-9 h-9" title="Bottom Left">↙️</button>
                                    <button onclick="snapWindow('${win.handle}', 'bottom-right')" class="p-2 nm-btn w-9 h-9" title="Bottom Right">↘️</button>
                                    <button onclick="snapWindow('${win.handle}', 'full')" class="p-2 nm-btn w-9 h-9" title="Fullscreen">🔲</button>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<p class="text-red-400 text-center py-4">API connection failed.</p>';
            }
        }

        function openKeyboardModal(handle, title) {
            currentHandle = handle;
            document.getElementById('keyboardModalTitle').innerText = title;
            document.getElementById('keyboardModal').classList.remove('hidden');
        }

        function closeKeyboardModal() {
            document.getElementById('keyboardModal').classList.add('hidden');
            currentHandle = null;
        }

        async function submitKeyboardText() {
            const input = document.getElementById('keyboardInput');
            if (!input.value || !currentHandle) return;
            await fetch('/api/type', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle: currentHandle, text: input.value })
            });
            input.value = '';
        }

        async function sendKey(key) {
            if (!currentHandle) return;
            await fetch('/api/key', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle: currentHandle, key })
            });
        }

        async function takeScreenshot(handle, title) {
            const img = document.getElementById('screenshotImg');
            const modal = document.getElementById('screenshotModal');
            document.getElementById('modalTitle').innerText = title;
            img.src = `/api/screenshot?handle=${handle}&t=${Date.now()}`;
            modal.classList.remove('hidden');
        }

        function closeScreenshotModal() {
            document.getElementById('screenshotModal').classList.add('hidden');
        }

        async function focusWindow(handle) {
            await fetch('/api/focus', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle })
            });
        }

        async function snapWindow(handle, position) {
            await fetch('/api/snap', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ handle, position })
            });
            if (position === 'next-monitor') setTimeout(refreshWindows, 500);
        }

        async function closeWindow(handle) {
            if (confirm('Terminate window?')) {
                await fetch('/api/close', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ handle })
                });
                setTimeout(refreshWindows, 500);
            }
        }

        async function getClipboard() {
            const res = await fetch('/api/clipboard/get');
            const data = await res.json();
            document.getElementById('clipboardArea').value = data.text;
        }

        async function setClipboard() {
            await fetch('/api/clipboard/set', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: document.getElementById('clipboardArea').value })
            });
        }

        async function openApp() {
            const cmd = document.getElementById('openCommand').value;
            if (!cmd) return;
            await fetch('/api/open', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ command: cmd })
            });
            document.getElementById('openCommand').value = '';
            setTimeout(refreshWindows, 1000);
        }

        async function setVolume(level) {
            await fetch('/api/volume', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ level: parseInt(level) })
            });
        }

        async function shutdownPC() {
            if (confirm('Initiate system shutdown?')) {
                await fetch('/api/shutdown', { method: 'POST' });
            }
        }

        refreshWindows();
        setInterval(refreshWindows, 15000);
    </script>
</body>
</html>
